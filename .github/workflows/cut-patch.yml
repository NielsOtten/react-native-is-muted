name: Cut patch

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cut-patch:
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch
        run: |
          if [[ ! "${{ github.ref_name }}" =~ ^release/[0-9]+\.[0-9]+$ ]]; then
            echo "Run this workflow from a release/X.Y branch (got '${{ github.ref_name }}')."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm test

      - name: Bump patch
        id: bump
        run: |
          NEW=$(npm version patch --no-git-tag-version)
          echo "version=${NEW#v}" >> $GITHUB_OUTPUT

      - name: Commit and tag
        run: |
          git add package.json package-lock.json
          git commit -m "chore: release v${{ steps.bump.outputs.version }}"
          git tag -a "v${{ steps.bump.outputs.version }}" -m "v${{ steps.bump.outputs.version }}"

      - name: Push branch and tag
        run: |
          git push origin "${{ github.ref_name }}"
          git push origin "v${{ steps.bump.outputs.version }}"

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: v${{ steps.bump.outputs.version }}
          target_commitish: ${{ github.ref_name }}
          generate_release_notes: true
