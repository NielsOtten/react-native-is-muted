name: Cut release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Bump type. Use 'Cut patch' for patches."
        required: true
        type: choice
        options:
          - minor
          - major

permissions:
  contents: write
  id-token: write

jobs:
  cut-release:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
          cache: npm

      - run: npm install -g npm@latest

      - run: npm ci

      - run: npm run lint

      - run: npm test

      - name: Bump version
        id: bump
        run: |
          NEW=$(npm version ${{ inputs.bump }} --no-git-tag-version)
          echo "version=${NEW#v}" >> $GITHUB_OUTPUT

      - name: Compute branch name
        id: branch
        run: |
          MINOR="${{ steps.bump.outputs.version }}"
          echo "name=release/${MINOR%.0}" >> $GITHUB_OUTPUT

      - name: Ensure branch does not exist
        run: |
          if git ls-remote --exit-code --heads origin "${{ steps.branch.outputs.name }}"; then
            echo "Branch ${{ steps.branch.outputs.name }} already exists."
            exit 1
          fi

      - name: Create release branch
        run: git checkout -b "${{ steps.branch.outputs.name }}"

      - name: Commit and tag
        run: |
          git add package.json package-lock.json
          git commit -m "chore: release v${{ steps.bump.outputs.version }}"
          git tag -a "v${{ steps.bump.outputs.version }}" -m "v${{ steps.bump.outputs.version }}"

      - name: Push branch and tag
        run: |
          git push origin "${{ steps.branch.outputs.name }}"
          git push origin "v${{ steps.bump.outputs.version }}"

      - name: Publish to npm
        run: npm publish --provenance

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: v${{ steps.bump.outputs.version }}
          target_commitish: ${{ steps.branch.outputs.name }}
          generate_release_notes: true
